package: basic_examples
title: Basic Fala examples
description: Neutral document workflow examples for Fala.
tags: ["example"]
version: "1"
document_types:
  - id: generic_document
    title: Generic document
    media_types: ["application/octet-stream", "text/plain"]
    value_schema:
      type: object
      properties:
        source:
          type: string
      additionalProperties: true
operation_types:
  - id: ingest
    category: intake
  - id: enrich
    category: enrichment
  - id: export
    category: delivery
artifact_kinds:
  - id: source_payload
    title: Source payload
    media_types: ["text/plain", "application/json"]
  - id: enriched_payload
    title: Enriched payload
    media_types: ["application/json"]
  - id: exported_document
    title: Exported document
    media_types: ["application/json"]
capabilities:
  - id: ingest_document
    title: Ingest document
    operation_type: ingest
    accepts_document_types: [generic_document]
    emits_artifact_kinds: [source_payload]
  - id: enrich_document
    title: Enrich document
    operation_type: enrich
    accepts_artifact_kinds: [source_payload]
    emits_artifact_kinds: [enriched_payload]
  - id: export_document
    title: Export document
    operation_type: export
    accepts_artifact_kinds: [enriched_payload]
    emits_artifact_kinds: [exported_document]
pipelines:
  - basic_enrichment.yaml
