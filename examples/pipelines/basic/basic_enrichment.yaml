id: basic_enrichment
title: Basic carrier enrichment
description: Three subprocess boundaries coordinated by Fala.
tags: ["example"]
version: "2"
steps:
  - id: ingest
    title: Ingest
    capability: ingest_source
    adapter:
      kind: subprocess
      command: ["python", "steps/ingest.py"]
      cwd: "."
  - id: enrich
    title: Enrich
    capability: enrich_source
    needs: [ingest]
    adapter:
      kind: subprocess
      command: ["python", "steps/enrich.py"]
      cwd: "."
  - id: export
    title: Export
    capability: export_source
    needs: [enrich]
    adapter:
      kind: subprocess
      command: ["python", "steps/export.py"]
      cwd: "."
