pipeline: basic_enrichment
title: Basic document enrichment
description: Three independent program boundaries coordinated by Fala.
tags: ["example"]
version: "1"
input_values:
  source: "{source}"
steps:
  - id: ingest
    title: Ingest
    adapter:
      kind: subprocess
      command: ["python", "steps/ingest.py"]
      cwd: "."
  - id: enrich
    title: Enrich
    needs: [ingest]
    adapter:
      kind: subprocess
      command: ["python", "steps/enrich.py"]
      cwd: "."
  - id: export
    title: Export
    needs: [enrich]
    adapter:
      kind: subprocess
      command: ["python", "steps/export.py"]
      cwd: "."
combines:
  - id: document_result
    mode: latest
    needs: [ingest, enrich, export]
