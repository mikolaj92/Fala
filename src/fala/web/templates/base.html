<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or app_title }}</title>
    <link rel="stylesheet" href="{{ static_path }}/basecoat/basecoat.css">
    <script src="{{ static_path }}/basecoat/basecoat.js" defer></script>
    <script src="{{ static_path }}/htmx.min.js"></script>
    <script defer src="{{ static_path }}/alpine.min.js"></script>
    <style>
      body { min-height: 100vh; background: var(--color-background); color: var(--color-foreground); }
      .fala-shell { display: grid; grid-template-columns: 17rem minmax(0, 1fr); min-height: 100vh; }
      .fala-sidebar { border-right: 1px solid var(--color-border); padding: 1rem; background: var(--color-sidebar, var(--color-background)); }
      .fala-main { min-width: 0; padding: 1.5rem; }
      .fala-nav { display: flex; flex-direction: column; gap: 0.25rem; margin-top: 1.5rem; }
      .fala-nav a { border-radius: 0.5rem; padding: 0.625rem 0.75rem; color: var(--color-muted-foreground); }
      .fala-nav a:hover { background: var(--color-muted); color: var(--color-foreground); }
      .fala-logo { display: flex; align-items: center; gap: 0.75rem; }
      .fala-logo-mark { display: grid; width: 2rem; height: 2rem; place-items: center; border-radius: 0.5rem; background: var(--color-primary); color: var(--color-primary-foreground); font-weight: 700; }
      .fala-card-grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(12rem, 1fr)); }
      .fala-table { width: 100%; border-collapse: collapse; }
      .fala-table th, .fala-table td { border-bottom: 1px solid var(--color-border); padding: 0.75rem; text-align: left; vertical-align: top; }
      .fala-table th { color: var(--color-muted-foreground); font-size: 0.75rem; font-weight: 600; }
      .fala-status-running { background: color-mix(in oklab, var(--color-blue-500) 14%, transparent); }
      .fala-status-paused { background: color-mix(in oklab, var(--color-purple-500) 14%, transparent); }
      .fala-status-queued, .fala-status-waiting { background: color-mix(in oklab, var(--color-yellow-500) 16%, transparent); }
      .fala-status-ready, .fala-status-leased { background: color-mix(in oklab, var(--color-yellow-500) 16%, transparent); }
      .fala-status-warning { background: color-mix(in oklab, var(--color-yellow-500) 16%, transparent); }
      .fala-status-dead_letter { background: color-mix(in oklab, var(--color-red-500) 18%, transparent); }
      .fala-status-error { background: color-mix(in oklab, var(--color-red-500) 18%, transparent); }
      .fala-status-failed, .fala-status-cancelled { background: color-mix(in oklab, var(--color-red-500) 14%, transparent); }
      .fala-status-completed { background: color-mix(in oklab, var(--color-green-500) 14%, transparent); }
      .fala-action-btn { border: 1px solid var(--color-border); border-radius: 0.375rem; padding: 0.25rem 0.5rem; font-size: 0.75rem; color: var(--color-muted-foreground); }
      .fala-action-btn:hover { background: var(--color-muted); color: var(--color-foreground); }
      .fala-action-danger:hover { border-color: var(--color-red-500); color: var(--color-red-600); }
      @media (max-width: 760px) {
        .fala-shell { grid-template-columns: 1fr; }
        .fala-sidebar { position: static; }
        .fala-main { padding: 1rem; }
      }
    </style>
  </head>
  <body>
    <div class="fala-shell">
      <aside class="fala-sidebar">
        <a href="/" class="fala-logo">
          <div class="fala-logo-mark">F</div>
          <div>
            <div class="font-semibold">{{ app_title }}</div>
            <div class="text-xs text-muted-foreground">runs · queue · runtime</div>
          </div>
        </a>
        <nav class="fala-nav" aria-label="Main">
          <a href="/project">Project</a>
          <a href="/project/bootstrap">Bootstrap</a>
          <a href="/project/spec">Spec</a>
          <a href="/project/operations">Operations</a>
          <a href="/project/alerts">Alerts</a>
          <a href="/project/lifecycle">Lifecycle</a>
          <a href="/runs">Runs</a>
          <a href="/queue">Queue</a>
          <a href="/process-runtime/pipelines">Pipelines</a>
          <a href="/process-runtime/blueprints">Blueprints</a>
          <a href="/health">Health</a>
        </nav>
      </aside>
      <main class="fala-main">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
